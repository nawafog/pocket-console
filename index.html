<!DOCTYPE html>
<html>
<head>
    <title>NEON DRIFT CONSOLE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00f0ff; z-index: 10; background: rgba(0,0,0,0.7); padding: 15px; border: 2px solid #00f0ff; border-radius: 10px; }
        #qrcode { background: white; padding: 10px; margin-top: 10px; display: inline-block; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 24px; font-weight: bold;">NEON DRIFT</div>
        <div>ROOM: <span id="room-id" style="color:#fff">---</span></div>
        <div id="qrcode"></div>
    </div>

    <script>
        // --- PASTE YOUR FIREBASE CONFIG HERE ---
       // For Firebase JS SDK v7.20.0 and later, measurementId is optional
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBFd2-d2SAhJSAco_W6Rg1aJJhL4sM1fYU",
  authDomain: "pocketconsole-43c40.firebaseapp.com",
  databaseURL: "https://pocketconsole-43c40-default-rtdb.firebaseio.com",
  projectId: "pocketconsole-43c40",
  storageBucket: "pocketconsole-43c40.firebasestorage.app",
  messagingSenderId: "726369889813",
  appId: "1:726369889813:web:9eace091130368fe04281c",
  measurementId: "G-1CB22YP0MC"
};
};
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const roomId = Math.random().toString(36).substring(2, 7).toUpperCase();
        document.getElementById('room-id').innerText = roomId;

        const currentUrl = window.location.href;
        let baseUrl = currentUrl.split('index.html')[0];
        if (!baseUrl.endsWith('/')) baseUrl += '/';
        new QRCode(document.getElementById("qrcode"), { text: baseUrl + "mobile.html?room=" + roomId, width: 120, height: 120 });

        // --- THREE.JS WORLD SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Neon Grid and Environment
        scene.add(new THREE.GridHelper(200, 50, 0x00f0ff, 0x111111));
        camera.position.set(0, 15, 30);
        camera.lookAt(0, 0, 0);

        const players = {};
        const playerData = {};

        db.ref(`rooms/${roomId}/players`).on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            Object.keys(data).forEach(id => {
                if(!players[id]) {
                    // Build a "Buggy" Car Mesh
                    const group = new THREE.Group();
                    const body = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 4), new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff }));
                    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1, 1.5), new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 }));
                    cabin.position.y = 1;
                    group.add(body, cabin);
                    players[id] = group;
                    scene.add(group);
                    playerData[id] = { vel: 0, rot: 0 };
                }
                // Store raw input for the animation loop
                playerData[id].input = data[id];
            });
        });

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7);
        scene.add(light, new THREE.AmbientLight(0x404040));

        // --- GAME ENGINE LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            Object.keys(playerData).forEach(id => {
                const p = players[id];
                const input = playerData[id].input;
                if(!input) return;

                // Physics: Forward/Back and Steering
                const targetSpeed = input.y * -0.8;
                playerData[id].vel = THREE.MathUtils.lerp(playerData[id].vel, targetSpeed, 0.1);
                
                p.translateZ(playerData[id].vel);
                p.rotation.y += input.x * -0.05 * (playerData[id].vel / 0.5); // Turn more when moving

                // Turbo/Jump logic
                if(input.action && p.position.y <= 0.1) {
                    p.position.y = 5; // Simple jump
                }
                p.position.y = THREE.MathUtils.lerp(p.position.y, 0, 0.1); // Gravity
                
                // Tilt car when turning
                p.rotation.z = THREE.MathUtils.lerp(p.rotation.z, input.x * 0.3, 0.1);
            });
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
