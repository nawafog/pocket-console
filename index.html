<!DOCTYPE html>
<html>
<head>
    <title>NEON DRIFT CONSOLE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00f0ff; z-index: 10; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #00f0ff; border-radius: 10px; }
        #qrcode { background: white; padding: 10px; margin-top: 10px; display: inline-block; border-radius: 5px; min-height: 120px; min-width: 120px; }
    </style>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
    body { margin: 0; overflow: hidden; background: #020205; font-family: 'Orbitron', sans-serif; }
    
    #ui { 
        position: absolute; top: 30px; left: 30px; color: #fff; z-index: 10; 
        background: rgba(0, 10, 20, 0.85); padding: 25px; 
        border: 2px solid #00f0ff; border-radius: 5px;
        box-shadow: 0 0 20px rgba(0, 240, 255, 0.4), inset 0 0 10px rgba(0, 240, 255, 0.2);
    }
    
    .logo { 
        font-size: 28px; font-weight: 800; color: #00f0ff; text-shadow: 0 0 10px #00f0ff;
        letter-spacing: 4px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px;
    }
    
    .room-label { font-size: 12px; color: #888; text-transform: uppercase; }
    #room-id { font-size: 24px; color: #ff0055; text-shadow: 0 0 10px #ff0055; display: block; }
    
    #qrcode { 
        background: #fff; padding: 12px; margin-top: 15px; border-radius: 4px;
        box-shadow: 0 0 15px rgba(255,255,255,0.3); display: inline-block;
    }
    
    .status { margin-top: 10px; font-size: 10px; color: #00f0ff; opacity: 0.7; }
</style>

<div id="ui">
    <div class="logo">NEON DRIFT</div>
    <span class="room-label">Access Code</span>
    <span id="room-id">---</span>
    <div id="qrcode"></div>
    <div class="status">● SYSTEM ONLINE</div>
</div>
</body>
</html>
