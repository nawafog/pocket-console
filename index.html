<!DOCTYPE html>
<html>
<head>
    <title>NEON DRIFT CONSOLE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00f0ff; z-index: 10; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #00f0ff; border-radius: 10px; }
        #qrcode { background: white; padding: 10px; margin-top: 10px; display: inline-block; border-radius: 5px; min-height: 120px; min-width: 120px; }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 22px; font-weight: bold; letter-spacing: 2px;">NEON DRIFT</div>
        <div style="margin-top:5px;">ROOM: <span id="room-id" style="color:#fff; font-weight:bold;">---</span></div>
        <div id="qrcode"></div>
        <div style="font-size: 10px; color: #666; margin-top: 5px;">SCAN TO JOIN</div>
    </div>

    <script>
        // --- YOUR ACTUAL FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyBFd2-d2SAhJSAco_W6Rg1aJJhL4sM1fYU",
            authDomain: "pocketconsole-43c40.firebaseapp.com",
            databaseURL: "https://pocketconsole-43c40-default-rtdb.firebaseio.com",
            projectId: "pocketconsole-43c40",
            storageBucket: "pocketconsole-43c40.firebasestorage.app",
            messagingSenderId: "726369889813",
            appId: "1:726369889813:web:9eace091130368fe04281c",
            measurementId: "G-1CB22YP0MC"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const roomId = Math.random().toString(36).substring(2, 7).toUpperCase();
        document.getElementById('room-id').innerText = roomId;

        // Generate dynamic link for GitHub
        const currentUrl = window.location.href;
        let baseUrl = currentUrl.split('index.html')[0];
        if (!baseUrl.endsWith('/')) baseUrl += '/';
        const finalControllerUrl = baseUrl + "mobile.html?room=" + roomId;

        new QRCode(document.getElementById("qrcode"), { 
            text: finalControllerUrl, 
            width: 120, 
            height: 120 
        });

        // --- THREE.JS ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.GridHelper(200, 40, 0x00f0ff, 0x222222));
        camera.position.set(0, 15, 30);
        camera.lookAt(0, 0, 0);

        const players = {};
        const playerData = {};

        db.ref(`rooms/${roomId}/players`).on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            Object.keys(data).forEach(id => {
                if(!players[id]) {
                    const group = new THREE.Group();
                    const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 3.5), new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff }));
                    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.8, 1.2), new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 }));
                    cabin.position.y = 0.8;
                    group.add(body, cabin);
                    players[id] = group;
                    scene.add(group);
                    playerData[id] = { vel: 0, input: {x:0, y:0, action:false} };
                }
                playerData[id].input = data[id];
            });
        });

        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(10, 20, 10);
        scene.add(light, new THREE.AmbientLight(0x404040));

        function animate() {
            requestAnimationFrame(animate);
            Object.keys(playerData).forEach(id => {
                const p = players[id];
                const input = playerData[id].input;
                
                // Acceleration & Friction
                const targetSpeed = (input.y || 0) * -0.7;
                playerData[id].vel = THREE.MathUtils.lerp(playerData[id].vel, targetSpeed, 0.05);
                
                p.translateZ(playerData[id].vel);
                p.rotation.y += (input.x || 0) * -0.04 * (Math.abs(playerData[id].vel) + 0.1);

                // Action (Jump)
                if(input.action && p.position.y <= 0.1) p.position.y = 4;
                p.position.y = THREE.MathUtils.lerp(p.position.y, 0, 0.1);
                
                // Tilt
                p.rotation.z = THREE.MathUtils.lerp(p.rotation.z, (input.x || 0) * 0.4, 0.1);
            });
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
