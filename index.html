<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BEACH BUGGY: ISLAND DRIFT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Luckiest Guy', cursive; }
        #ui { 
            position: absolute; top: 20px; left: 20px; color: #fff; z-index: 100; 
            background: rgba(255, 165, 0, 0.9); padding: 15px; border: 4px solid #fff; 
            border-radius: 15px; box-shadow: 5px 5px 0px #d2691e;
        }
        #qrcode { background: #fff; padding: 5px; margin-top: 10px; border-radius: 10px; display: inline-block; }
        #score-tag { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 30px; -webkit-text-stroke: 2px #d2691e; }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 24px;">BEACH BUGGY</div>
        <div id="room-display" style="font-size: 14px; margin: 5px 0;">ROOM: ---</div>
        <div id="qrcode"></div>
    </div>
    <div id="score-tag">COINS: <span id="val">0</span></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFd2-d2SAhJSAco_W6Rg1aJJhL4sM1fYU",
            authDomain: "pocketconsole-43c40.firebaseapp.com",
            databaseURL: "https://pocketconsole-43c40-default-rtdb.firebaseio.com",
            projectId: "pocketconsole-43c40",
            storageBucket: "pocketconsole-43c40.firebasestorage.app",
            messagingSenderId: "726369889813",
            appId: "1:726369889813:web:9eace091130368fe04281c",
            measurementId: "G-1CB22YP0MC"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const roomId = Math.random().toString(36).substring(2, 6).toUpperCase();
        document.getElementById('room-display').innerText = "ROOM: " + roomId;

        const currentUrl = window.location.href;
        let baseUrl = currentUrl.split('index.html')[0];
        if (!baseUrl.endsWith('/')) baseUrl += '/';
        new QRCode(document.getElementById("qrcode"), { text: baseUrl + "mobile.html?room=" + roomId, width: 100, height: 100 });

        // --- WORLD SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky Blue
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lighting (Sunny Day)
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(50, 100, 50);
        light.castShadow = true;
        scene.add(light, new THREE.AmbientLight(0xffffff, 0.4));

        // Procedural Sand Texture
        function createSand() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#f2d2a9'; ctx.fillRect(0,0,256,256);
            for(let i=0; i<2000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#e6c295' : '#f7e1c1';
                ctx.fillRect(Math.random()*256, Math.random()*256, 2, 2);
            }
            return new THREE.CanvasTexture(canvas);
        }

        // Island & Water
        const islandGeo = new THREE.CircleGeometry(400, 64);
        const islandMat = new THREE.MeshStandardMaterial({ map: createSand() });
        const island = new THREE.Mesh(islandGeo, islandMat);
        island.rotation.x = -Math.PI/2;
        island.receiveShadow = true;
        scene.add(island);

        const waterGeo = new THREE.PlaneGeometry(5000, 5000);
        const waterMat = new THREE.MeshStandardMaterial({ color: 0x0077be, transparent: true, opacity: 0.8 });
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI/2;
        water.position.y = -2;
        scene.add(water);

        // Palm Trees & Rocks
        const obstacles = [];
        for(let i=0; i<40; i++) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(1, 1.5, 15), new THREE.MeshStandardMaterial({color: 0x8b4513}));
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(6, 8, 8), new THREE.MeshStandardMaterial({color: 0x228b22}));
            leaves.position.y = 8; tree.add(trunk, leaves);
            tree.position.set(Math.random()*600-300, 7.5, Math.random()*600-300);
            if(tree.position.length() < 50) tree.position.x += 100;
            scene.add(tree); obstacles.push(trunk);
        }

        const players = {};
        const playerData = {};
        let coins = 0;

        // Buggy Model Function
        function createBuggy(color) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(4, 1.5, 7), new THREE.MeshStandardMaterial({color: color}));
            const rollCage = new THREE.Mesh(new THREE.TorusGeometry(2, 0.2, 8, 6, Math.PI), new THREE.MeshStandardMaterial({color: 0x222222}));
            rollCage.position.y = 1.5; rollCage.rotation.x = -Math.PI/2;
            g.add(body, rollCage);
            // Big Wheels
            for(let i=0; i<4; i++) {
                const w = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 1.2, 16), new THREE.MeshStandardMaterial({color: 0x111111}));
                w.rotation.z = Math.PI/2;
                w.position.set(i<2?-2.5:2.5, -0.5, i%2==0?2.5:-2.5);
                g.add(w);
            }
            return g;
        }

        db.ref(`rooms/${roomId}/players`).on('value', (s) => {
            const data = s.val(); if(!data) return;
            Object.keys(data).forEach(id => {
                if(!players[id]) {
                    const buggy = createBuggy(new THREE.Color(`hsl(${Math.random()*360}, 70%, 50%)`));
                    scene.add(buggy); players[id] = buggy;
                    playerData[id] = { vel: 0, inp: {x:0, y:0} };
                }
                playerData[id].inp = data[id];
            });
        });

        function animate() {
            requestAnimationFrame(animate);
            Object.keys(playerData).forEach(id => {
                const p = players[id]; const d = playerData[id];
                const old = p.position.clone();
                d.vel = THREE.MathUtils.lerp(d.vel, (d.inp.y || 0) * -2.5, 0.1);
                p.translateZ(d.vel);
                p.rotation.y += (d.inp.x || 0) * -0.07 * (Math.abs(d.vel) * 0.4 + 0.1);
                // Gravity/Jump
                if(d.inp.action && p.position.y <= 0.1) p.position.y = 6;
                p.position.y = THREE.MathUtils.lerp(p.position.y, 0, 0.1);
                // Camera Follow (Main Player)
                if(id === Object.keys(players)[0]) {
                    const offset = new THREE.Vector3(0, 20, 50).applyMatrix4(p.matrixWorld);
                    camera.position.lerp(offset, 0.1);
                    camera.lookAt(p.position);
                }
            });
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
