<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON CONTROLLER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');
        body { margin: 0; background: #020205; color: #00f0ff; font-family: 'Orbitron', sans-serif; overflow: hidden; touch-action: none; }
        #joy { width: 170px; height: 170px; background: rgba(0,240,255,0.05); border: 3px solid #00f0ff; border-radius: 50%; position: absolute; left: 40px; bottom: 60px; box-shadow: 0 0 20px rgba(0,240,255,0.2); }
        #stick { width: 75px; height: 75px; background: #00f0ff; border-radius: 50%; position: absolute; top: 47px; left: 47px; box-shadow: 0 0 25px #00f0ff; }
        #btn { width: 130px; height: 130px; background: rgba(255,0,85,0.1); border: 4px solid #ff0055; border-radius: 50%; position: absolute; right: 40px; bottom: 80px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #ff0055; text-shadow: 0 0 10px #ff0055; box-shadow: 0 0 25px #ff0055; }
        #btn:active { background: #ff0055; color: white; transform: scale(0.9); }
        #room-info { width: 100%; text-align: center; margin-top: 30px; letter-spacing: 2px; opacity: 0.6; }
    </style>
</head>
<body>
    <div id="room-info">DRIVE: <span id="r-val">---</span></div>
    <div id="joy"><div id="stick"></div></div>
    <div id="btn">BOOST</div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFd2-d2SAhJSAco_W6Rg1aJJhL4sM1fYU",
            authDomain: "pocketconsole-43c40.firebaseapp.com",
            databaseURL: "https://pocketconsole-43c40-default-rtdb.firebaseio.com",
            projectId: "pocketconsole-43c40",
            storageBucket: "pocketconsole-43c40.firebasestorage.app",
            messagingSenderId: "726369889813",
            appId: "1:726369889813:web:9eace091130368fe04281c",
            measurementId: "G-1CB22YP0MC"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const roomId = new URLSearchParams(window.location.search).get('room');
        const playerId = "CAR_" + Math.floor(Math.random() * 999);
        document.getElementById('r-val').innerText = roomId;
        const state = { x: 0, y: 0, action: false };
        document.getElementById('btn').addEventListener('touchstart', (e) => { e.preventDefault(); state.action = true; sync(); });
        document.getElementById('btn').addEventListener('touchend', (e) => { e.preventDefault(); state.action = false; sync(); });
        window.addEventListener('touchmove', (e) => {
            const t = e.touches[0];
            const r = document.getElementById('joy').getBoundingClientRect();
            let dx = (t.clientX - (r.left + 85)) / 85;
            let dy = (t.clientY - (r.top + 85)) / 85;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist > 1) { dx /= dist; dy /= dist; }
            state.x = dx; state.y = dy;
            document.getElementById('stick').style.transform = `translate(${dx * 50}px, ${dy * 50}px)`;
            sync();
        });
        window.addEventListener('touchend', () => { state.x = 0; state.y = 0; document.getElementById('stick').style.transform = `translate(0,0)`; sync(); });
        function sync() { db.ref(`rooms/${roomId}/players/${playerId}`).set(state); }
    </script>
</body>
</html>
