<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROLLER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #050505; color: white; touch-action: none; overflow: hidden; font-family: sans-serif; }
        #joy { width: 140px; height: 140px; background: rgba(0,240,255,0.1); border: 2px solid #00f0ff; border-radius: 50%; position: absolute; left: 30px; bottom: 40px; }
        #stick { width: 60px; height: 60px; background: #00f0ff; border-radius: 50%; position: absolute; top: 40px; left: 40px; }
        #jump { width: 90px; height: 90px; background: #ff0055; border-radius: 50%; position: absolute; right: 30px; bottom: 65px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 3px solid #fff; box-shadow: 0 0 15px #ff0055; }
    </style>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');
    body { 
        margin: 0; background: radial-gradient(circle at center, #1a1a2e 0%, #020205 100%); 
        color: white; touch-action: none; overflow: hidden; font-family: 'Orbitron', sans-serif; 
    }
    
    #header { position: absolute; top: 20px; width: 100%; text-align: center; color: #00f0ff; font-size: 14px; opacity: 0.6; }
    
    /* The Joystick Base */
    #joy { 
        width: 160px; height: 160px; background: rgba(255,255,255,0.03); 
        border: 2px solid rgba(0, 240, 255, 0.3); border-radius: 50%; 
        position: absolute; left: 40px; bottom: 60px;
        box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }
    
    /* The Joystick Handle */
    #stick { 
        width: 70px; height: 70px; background: linear-gradient(145deg, #00f0ff, #0088ff); 
        border-radius: 50%; position: absolute; top: 45px; left: 45px;
        box-shadow: 0 0 20px #00f0ff, inset 0 0 10px rgba(255,255,255,0.5);
    }

    /* The Jump/Action Button */
    #jump { 
        width: 110px; height: 110px; background: rgba(255, 0, 85, 0.1); 
        border: 3px solid #ff0055; border-radius: 50%; 
        position: absolute; right: 40px; bottom: 85px; 
        display: flex; align-items: center; justify-content: center;
        color: #ff0055; font-weight: bold; font-size: 18px;
        text-shadow: 0 0 10px #ff0055; box-shadow: 0 0 20px rgba(255, 0, 85, 0.3);
    }
    
    #jump:active { background: #ff0055; color: #fff; transform: scale(0.95); }
</style>

<div id="header">LINKED TO NEON-CORE // <span id="r-display">---</span></div>
<div id="joy"><div id="stick"></div></div>
<div id="jump">BOOST</div>
</body>
</html>
