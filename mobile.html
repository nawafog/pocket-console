<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRIFT CONTROLLER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #0a0a0a; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #joystick { width: 150px; height: 150px; background: rgba(0,240,255,0.1); border: 2px solid #00f0ff; border-radius: 50%; position: absolute; left: 30px; bottom: 50px; }
        #stick { width: 60px; height: 60px; background: #00f0ff; border-radius: 50%; position: absolute; top: 45px; left: 45px; }
        #btn { width: 100px; height: 100px; background: #ff0055; border-radius: 50%; position: absolute; right: 30px; bottom: 75px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border: 4px solid white; box-shadow: 0 0 20px #ff0055; }
    </style>
</head>
<body>
    <div id="joystick"><div id="stick"></div></div>
    <div id="btn">BOOST</div>

    <script>
        // --- PASTE THE SAME FIREBASE CONFIG HERE ---
       // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBFd2-d2SAhJSAco_W6Rg1aJJhL4sM1fYU",
  authDomain: "pocketconsole-43c40.firebaseapp.com",
  databaseURL: "https://pocketconsole-43c40-default-rtdb.firebaseio.com",
  projectId: "pocketconsole-43c40",
  storageBucket: "pocketconsole-43c40.firebasestorage.app",
  messagingSenderId: "726369889813",
  appId: "1:726369889813:web:9eace091130368fe04281c",
  measurementId: "G-1CB22YP0MC"
};
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const roomId = new URLSearchParams(window.location.search).get('room');
        const playerId = "Car_" + Math.floor(Math.random() * 1000);
        const state = { x: 0, y: 0, action: false };

        // Action Button
        const btn = document.getElementById('btn');
        btn.addEventListener('touchstart', () => { state.action = true; send(); });
        btn.addEventListener('touchend', () => { state.action = false; send(); });

        // Joystick Logic
        const stick = document.getElementById('stick');
        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const rect = document.getElementById('joystick').getBoundingClientRect();
            let x = (touch.clientX - (rect.left + 75)) / 75;
            let y = (touch.clientY - (rect.top + 75)) / 75;
            const dist = Math.sqrt(x*x + y*y);
            if(dist > 1) { x /= dist; y /= dist; }
            state.x = x; state.y = y;
            stick.style.transform = `translate(${x * 45}px, ${y * 45}px)`;
            send();
        });

        window.addEventListener('touchend', () => { 
            state.x = 0; state.y = 0; 
            stick.style.transform = `translate(0,0)`;
            send(); 
        });

        function send() { db.ref(`rooms/${roomId}/players/${playerId}`).set(state); }
    </script>
</body>
</html>
