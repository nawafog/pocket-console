<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROLLER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #050505; color: white; touch-action: none; overflow: hidden; font-family: sans-serif; }
        #joy { width: 140px; height: 140px; background: rgba(0,240,255,0.1); border: 2px solid #00f0ff; border-radius: 50%; position: absolute; left: 30px; bottom: 40px; }
        #stick { width: 60px; height: 60px; background: #00f0ff; border-radius: 50%; position: absolute; top: 40px; left: 40px; }
        #jump { width: 90px; height: 90px; background: #ff0055; border-radius: 50%; position: absolute; right: 30px; bottom: 65px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 3px solid #fff; box-shadow: 0 0 15px #ff0055; }
    </style>
</head>
<body>
    <div id="joy"><div id="stick"></div></div>
    <div id="jump">JUMP</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFd2-d2SAhJSAco_W6Rg1aJJhL4sM1fYU",
            authDomain: "pocketconsole-43c40.firebaseapp.com",
            databaseURL: "https://pocketconsole-43c40-default-rtdb.firebaseio.com",
            projectId: "pocketconsole-43c40",
            storageBucket: "pocketconsole-43c40.firebasestorage.app",
            messagingSenderId: "726369889813",
            appId: "1:726369889813:web:9eace091130368fe04281c",
            measurementId: "G-1CB22YP0MC"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const roomId = new URLSearchParams(window.location.search).get('room');
        const playerId = "Player_" + Math.floor(Math.random() * 999);
        const state = { x: 0, y: 0, action: false };

        const jumpBtn = document.getElementById('jump');
        jumpBtn.addEventListener('touchstart', () => { state.action = true; sync(); });
        jumpBtn.addEventListener('touchend', () => { state.action = false; sync(); });

        const stick = document.getElementById('stick');
        window.addEventListener('touchmove', (e) => {
            const t = e.touches[0];
            const r = document.getElementById('joy').getBoundingClientRect();
            let dx = (t.clientX - (r.left + 70)) / 70;
            let dy = (t.clientY - (r.top + 70)) / 70;
            const d = Math.sqrt(dx*dx + dy*dy);
            if(d > 1) { dx /= d; dy /= d; }
            state.x = dx; state.y = dy;
            stick.style.transform = `translate(${dx * 40}px, ${dy * 40}px)`;
            sync();
        });

        window.addEventListener('touchend', () => {
            state.x = 0; state.y = 0;
            stick.style.transform = `translate(0,0)`;
            sync();
        });

        function sync() { db.ref(`rooms/${roomId}/players/${playerId}`).set(state); }
    </script>
</body>
</html>
