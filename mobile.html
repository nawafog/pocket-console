<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUGGY REMOTE</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        body { margin: 0; background: #f2d2a9; font-family: 'Luckiest Guy', cursive; overflow: hidden; touch-action: none; }
        #pad { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: space-between; padding: 40px; box-sizing: border-box; }
        .ctrl { width: 160px; height: 160px; background: #8b4513; border: 6px solid #fff; border-radius: 50%; position: relative; box-shadow: 0 10px 0 #5d2e0d; }
        #stick { width: 80px; height: 80px; background: #ffa500; border-radius: 50%; position: absolute; top: 40px; left: 40px; border: 4px solid #fff; }
        #jump { background: #228b22; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 24px; text-shadow: 2px 2px #145214; }
        #jump:active { transform: translateY(5px); box-shadow: 0 5px 0 #145214; }
    </style>
</head>
<body>
    <div id="pad">
        <div class="ctrl" id="joy"><div id="stick"></div></div>
        <div class="ctrl" id="jump">JUMP!</div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFd2-d2SAhJSAco_W6Rg1aJJhL4sM1fYU",
            authDomain: "pocketconsole-43c40.firebaseapp.com",
            databaseURL: "https://pocketconsole-43c40-default-rtdb.firebaseio.com",
            projectId: "pocketconsole-43c40",
            storageBucket: "pocketconsole-43c40.firebasestorage.app",
            messagingSenderId: "726369889813",
            appId: "1:726369889813:web:9eace091130368fe04281c",
            measurementId: "G-1CB22YP0MC"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const roomId = new URLSearchParams(window.location.search).get('room');
        const playerId = "B_" + Math.floor(Math.random() * 999);
        const state = { x: 0, y: 0, action: false };

        const btn = document.getElementById('jump');
        btn.ontouchstart = (e) => { e.preventDefault(); state.action = true; sync(); };
        btn.ontouchend = (e) => { e.preventDefault(); state.action = false; sync(); };

        window.ontouchmove = (e) => {
            const t = e.touches[0];
            const r = document.getElementById('joy').getBoundingClientRect();
            let dx = (t.clientX - (r.left + 80)) / 80;
            let dy = (t.clientY - (r.top + 80)) / 80;
            const d = Math.sqrt(dx*dx + dy*dy);
            if(d > 1) { dx /= d; dy /= d; }
            if(t.clientX < window.innerWidth/2) {
                state.x = dx; state.y = dy;
                document.getElementById('stick').style.transform = `translate(${dx*45}px, ${dy*45}px)`;
                sync();
            }
        };
        window.ontouchend = () => { state.x = 0; state.y = 0; document.getElementById('stick').style.transform = "translate(0,0)"; sync(); };
        function sync() { db.ref(`rooms/${roomId}/players/${playerId}`).set(state); }
    </script>
</body>
</html>
